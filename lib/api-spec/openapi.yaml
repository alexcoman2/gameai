openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for AI Gaming Companion
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: game
    description: Game detection operations
  - name: screenshot
    description: Screenshot capture operations
  - name: chat
    description: AI chat operations
  - name: settings
    description: App settings operations
  - name: sessions
    description: Conversation session operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /game/detect:
    get:
      operationId: detectGame
      tags: [game]
      summary: Detect running game
      description: Reads running processes and returns the detected game name
      responses:
        "200":
          description: Game detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameDetection"

  /screenshot/capture:
    post:
      operationId: captureScreenshot
      tags: [screenshot]
      summary: Capture a screenshot
      description: Takes a screenshot of the primary monitor and returns it as base64
      responses:
        "200":
          description: Screenshot captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screenshot"
        "500":
          description: Failed to capture screenshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /screenshot/latest:
    get:
      operationId: getLatestScreenshot
      tags: [screenshot]
      summary: Get the latest auto-captured screenshot
      description: Returns the most recently auto-captured screenshot stored in memory
      responses:
        "200":
          description: Latest screenshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Screenshot"

  /chat/message:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message to the AI assistant
      description: Sends a user message along with game context and optional screenshot to Claude
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "400":
          description: Bad request (e.g. missing API key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: AI API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get current settings
      description: Returns current app settings (API key is masked)
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    post:
      operationId: saveSettings
      tags: [settings]
      summary: Save settings
      description: Saves API key and screenshot interval to local config file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions
      description: Returns all saved conversation sessions sorted by most recently updated
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      description: Creates a new named conversation session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "200":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{sessionId}/messages:
    get:
      operationId: getSessionMessages
      tags: [sessions]
      summary: Get session messages
      description: Returns the display messages for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionMessages"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}:
    patch:
      operationId: renameSession
      tags: [sessions]
      summary: Rename a session
      description: Updates the name of a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      description: Permanently deletes a session and all its messages
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sessions/{sessionId}/clear:
    post:
      operationId: clearSession
      tags: [sessions]
      summary: Clear session messages
      description: Clears all messages in a session but keeps the session itself
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GameDetection:
      type: object
      properties:
        detected:
          type: boolean
        gameName:
          type: ["string", "null"]
        processName:
          type: ["string", "null"]
        confidence:
          type: string
          enum: [high, medium, low, none]
        source:
          type: ["string", "null"]
          enum: [local, steam-store, steam-api, null]
          description: Which detection method identified the game
      required:
        - detected
        - gameName
        - processName
        - confidence
        - source

    Screenshot:
      type: object
      properties:
        imageData:
          type: ["string", "null"]
          description: Base64 encoded PNG image data
        capturedAt:
          type: ["string", "null"]
          description: ISO timestamp when screenshot was taken
        available:
          type: boolean
      required:
        - imageData
        - capturedAt
        - available

    HistoryEntry:
      type: object
      description: A single turn in the conversation history (text only, no images)
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    WatchLogEntry:
      type: object
      description: A single passive observation recorded by watch mode
      properties:
        time:
          type: string
          description: Formatted time string (e.g. "10:32 PM")
        note:
          type: string
          description: One-sentence description of game state at this moment
      required:
        - time
        - note

    ChatMessageInput:
      type: object
      properties:
        message:
          type: string
          minLength: 1
        gameName:
          type: ["string", "null"]
          description: Currently detected game name for context
        includeScreenshot:
          type: boolean
          description: Whether to attach the latest local screenshot to the message
        imageData:
          type: ["string", "null"]
          description: Base64 PNG screenshot to attach (overrides includeScreenshot lookup)
        sessionId:
          type: ["string", "null"]
          description: Session ID to associate this message with
        history:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
          description: Full conversation history — when provided the hosted server is stateless (no disk writes)
        watchLog:
          type: array
          items:
            $ref: "#/components/schemas/WatchLogEntry"
          description: Passive screen observations collected by watch mode — injected into the system prompt so Claude knows what happened between messages
      required:
        - message

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        model:
          type: string
        tokensUsed:
          type: integer
        updatedHistory:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
          description: Updated history after this turn (only returned in stateless/hosted mode)
      required:
        - reply
        - model
        - tokensUsed

    Settings:
      type: object
      properties:
        screenshotInterval:
          type: integer
          description: Auto-screenshot interval in seconds
        autoCapture:
          type: boolean
          description: Whether auto screenshot capture is enabled
        hasSteamApiKey:
          type: boolean
          description: Whether a Steam Web API key is configured
      required:
        - screenshotInterval
        - autoCapture
        - hasSteamApiKey

    SettingsInput:
      type: object
      properties:
        screenshotInterval:
          type: ["integer", "null"]
          description: Auto-screenshot interval in seconds (5-300)
        autoCapture:
          type: ["boolean", "null"]
        steamApiKey:
          type: ["string", "null"]
          description: Steam Web API key for extended game detection (pass null to keep existing)
      required: []

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    Session:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
        messageCount:
          type: integer
        gameContext:
          type: ["string", "null"]
        diskUsageBytes:
          type: integer
      required:
        - id
        - name
        - createdAt
        - updatedAt
        - messageCount
        - gameContext
        - diskUsageBytes

    SessionInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name

    SessionUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name

    DisplayMessage:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        timestamp:
          type: string
        screenshot:
          type: ["string", "null"]
      required:
        - id
        - role
        - content
        - timestamp
        - screenshot

    SessionMessages:
      type: object
      properties:
        id:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DisplayMessage"
      required:
        - id
        - messages
