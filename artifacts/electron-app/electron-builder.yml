appId: gg.unstuck.app
productName: Unstuck
copyright: Copyright © 2026 Unstuck

asar: false

directories:
  output: dist-release
  buildResources: assets

files:
  - dist/main.js
  - dist/preload.js
  - package.json
  - "!node_modules"
  - "!src"
  - "!build.mjs"
  - "!tsconfig.json"
  - "!electron-builder.yml"

extraResources:
  - from: ../../artifacts/api-server/dist
    to: server
    filter:
      - "**/*"
  - from: ../../artifacts/gaming-companion/dist/public
    to: public
    filter:
      - "**/*"

protocols:
  - name: Unstuck Sign-In
    schemes:
      - unstuck

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Unstuck

linux:
  target:
    - target: deb
      arch:
        - x64
  category: Game

mac:
  target:
    - target: dmg
      arch:
        - x64
  category: public.app-category.games
