name: Build & Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.0.1) — leave blank to just build without publishing"
        required: false

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      NEXUS_LINK_API_URL: ${{ secrets.NEXUS_LINK_API_URL }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows installer
        run: pnpm --filter @workspace/electron-app run package

      - name: Find installer
        id: find_installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "artifacts/electron-app/dist-release" -Filter "*.exe" | Select-Object -First 1
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: artifacts/electron-app/dist-release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}
          name: "NEXUS_LINK ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.release_tag }}"
          draft: false
          prerelease: false
          files: artifacts/electron-app/dist-release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
